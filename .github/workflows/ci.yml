name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "Fido.svg"
      - "LICENSE"
      - ".gitignore"
      - ".env.example"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "Fido.svg"
      - "LICENSE"
      - ".gitignore"
      - ".env.example"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Pytest
        run: uv run pytest -v
